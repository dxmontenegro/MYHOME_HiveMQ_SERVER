<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DMX-V1_HiveMq</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- MQTT -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #ECEFF4;
  color: #2E3440;
  margin: 0;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.header {
  text-align: center;
  padding: 10px;
  font-weight: bold;
  font-size: 18px;
}

.esp {
  text-align: center;
  font-size: 13px;
  margin-bottom: 5px;
}

.grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 12px;
}

.card {
  border-radius: 18px;
  padding: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #FFFFFF;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  transition: all 0.15s ease;
}

.card:active {
  transform: scale(0.96);
}

.luz { border-left: 5px solid #4CC9F0; }
.seguranca { border-left: 5px solid #F72585; }
.sistema { border-left: 5px solid #4895EF; }

.card.on {
  background: #4CC9F0;
  color: white;
}

.seguranca.on {
  background: #E63946;
}

.footer {
  height: 50px;
  background: #FFFFFF;
  border-top: 1px solid #ddd;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="header">🏠 My Home - HiveMQ</div>
<div class="esp" id="espStatus">ESP: Conectando...</div>

<div class="grid" id="grid"></div>

<div class="footer">
  Powered by <strong>D.S.Montenegro</strong>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const client = mqtt.connect("wss://73102ccadf274c048b5834e6eb1dd292.s1.eu.hivemq.cloud:8884/mqtt", {
  username: "Monte",
  password: "Davi2013$",
  reconnectPeriod: 3000
});

let online = false;
let lastSeen = 0;

const dispositivos = [
  {nome:"Corredor", base:"casa/corredor", tipo:"luz"},
  {nome:"Escada", base:"casa/escada", tipo:"luz"},
  {nome:"Banheiro", base:"casa/banheiro", tipo:"luz"},
  {nome:"Quarto", base:"casa/quarto", tipo:"luz"},
  {nome:"Refletor", base:"casa/refletor", tipo:"luz"},
  {nome:"Sirene", base:"casa/sirene", tipo:"seguranca"},
  {nome:"Tudo", base:"casa/tudo", tipo:"sistema"},
  {nome:"LED ESP", base:"casa/led", tipo:"sistema"},
  {nome:"Auto", base:"casa/auto", tipo:"sistema"}
];

const grid = document.getElementById("grid");

// criar cards
dispositivos.forEach((d, i) => {
  grid.innerHTML += `
    <div class="card ${d.tipo}" id="card${i}">
      ${d.nome}
    </div>
  `;
});

// clique com resposta instantânea
dispositivos.forEach((d, i) => {
  document.getElementById(`card${i}`).addEventListener("click", () => {

    if(!online) return;

    let card = document.getElementById(`card${i}`);
    let ligado = card.classList.contains("on") ? false : true;

    // ⚡ resposta imediata
    atualizarVisual(i, ligado);

    // 🚨 sirene
    if(d.base === "casa/sirene"){
      client.publish(`${d.base}/set`, "1");

      if(navigator.vibrate) navigator.vibrate(100);

      setTimeout(()=> {
        client.publish(`${d.base}/set`, "0");
      }, 2000);

      return;
    }

    if(navigator.vibrate) navigator.vibrate(50);

    client.publish(`${d.base}/set`, ligado ? "1" : "0");
  });
});

// MQTT conectado
client.on("connect", () => {
  client.subscribe("casa/status");
  client.subscribe("casa/+/state");
});

// recebimento
client.on("message", (topic, message) => {

  let msg = message.toString();

  // STATUS
  if(topic === "casa/status"){
    lastSeen = Date.now();
    setOnline(msg === "online");
  }

  // ESTADO REAL
  if(topic.includes("/state")){
    let nome = topic.split("/")[1];
    let index = dispositivos.findIndex(d => d.base.includes(nome));

    if(index !== -1){
      atualizarVisual(index, msg == "1");
    }
  }
});

// visual
function atualizarVisual(i, ligado){
  let card = document.getElementById(`card${i}`);
  ligado ? card.classList.add("on") : card.classList.remove("on");
}

// status
function setOnline(state){
  online = state;

  document.getElementById("espStatus").innerText =
    state ? "ESP: ONLINE 🟢" : "ESP: OFFLINE 🔴";

  dispositivos.forEach((_, i)=>{
    let card = document.getElementById(`card${i}`);
    card.style.opacity = state ? "1" : "0.4";
    card.style.pointerEvents = state ? "auto" : "none";
  });
}

// timeout offline
setInterval(()=>{
  if(Date.now() - lastSeen > 10000){
    setOnline(false);
  }
},2000);

// inicia
setOnline(false);

});
</script>

</body>
</html>
